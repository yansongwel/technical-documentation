name: mongodb-replicaset

services:
  mongo1:
    image: mongo:${MONGO_VERSION}
    container_name: mongo1
    restart: unless-stopped
    environment:
      - MONGO_REPLSET_NAME=${MONGO_REPLSET_NAME}
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_APP_DB=${MONGO_APP_DB}
      - MONGO_APP_USERNAME=${MONGO_APP_USERNAME}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
      - TZ=Asia/Shanghai
    command: ["bash", "/scripts/mongo1-bootstrap.sh"]
    volumes:
      - mongo1-data:/data/db
      - ./config/mongod.conf:/etc/mongo/mongod.conf:ro
      - ./config/keyfile:/etc/mongo-keyfile/keyfile
      - ./scripts:/scripts:ro
    ports:
      - "27017:27017"
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host 127.0.0.1 --eval 'try{db.getSiblingDB(\"admin\").auth(process.env.MONGO_ROOT_USERNAME, process.env.MONGO_ROOT_PASSWORD)}catch(e){}; db.adminCommand({ping:1}).ok' | grep -q 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 60

  mongo2:
    image: mongo:${MONGO_VERSION}
    container_name: mongo2
    restart: unless-stopped
    environment:
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - TZ=Asia/Shanghai
    command: ["bash", "-lc", "chmod 0400 /etc/mongo-keyfile/keyfile || true; exec mongod --config /etc/mongo/mongod.conf"]
    volumes:
      - mongo2-data:/data/db
      - ./config/mongod.conf:/etc/mongo/mongod.conf:ro
      - ./config/keyfile:/etc/mongo-keyfile/keyfile
    ports:
      - "27018:27017"
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host 127.0.0.1 --eval 'try{db.getSiblingDB(\"admin\").auth(process.env.MONGO_ROOT_USERNAME, process.env.MONGO_ROOT_PASSWORD)}catch(e){}; db.adminCommand({ping:1}).ok' | grep -q 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 60

  mongo3:
    image: mongo:${MONGO_VERSION}
    container_name: mongo3
    restart: unless-stopped
    environment:
      - MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - TZ=Asia/Shanghai
    command: ["bash", "-lc", "chmod 0400 /etc/mongo-keyfile/keyfile || true; exec mongod --config /etc/mongo/mongod.conf"]
    volumes:
      - mongo3-data:/data/db
      - ./config/mongod.conf:/etc/mongo/mongod.conf:ro
      - ./config/keyfile:/etc/mongo-keyfile/keyfile
    ports:
      - "27019:27017"
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host 127.0.0.1 --eval 'try{db.getSiblingDB(\"admin\").auth(process.env.MONGO_ROOT_USERNAME, process.env.MONGO_ROOT_PASSWORD)}catch(e){}; db.adminCommand({ping:1}).ok' | grep -q 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 60

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:
