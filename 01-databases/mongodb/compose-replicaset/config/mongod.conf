# ============================================================
# MongoDB 生产基线配置（Replica Set）
# 说明：
# - 该文件会被 3 个节点共用（容器内端口一致，靠副本集成员 host 区分）
# - 配置项请结合实例内存/磁盘/IO 能力调优，以下为安全与稳定优先的基线
# ============================================================

systemLog:
  destination: file
  path: /dev/stdout                          # 容器标准输出（推荐，便于 docker logs 采集）
  logAppend: true                            # 追加写入（避免重启覆盖）
  verbosity: 0                               # 0=info，生产建议保持 0

storage:
  dbPath: /data/db                           # 数据目录（映射到持久化卷）
  wiredTiger:
    engineConfig:
      cacheSizeGB: 1                         # WiredTiger 缓存（按容器内存调整，经验：内存的 30%~50%）
      journalCompressor: zstd                # Journal 压缩算法：zstd（更高压缩比，略增 CPU）
    collectionConfig:
      blockCompressor: zstd                  # 数据块压缩：zstd（通常优于 snappy 的压缩比）

processManagement:
  fork: false                                # 容器内前台运行（由 Docker 负责守护）

net:
  port: 27017
  bindIpAll: true                            # 容器化场景建议开启；生产请配合安全组/防火墙/网络隔离
  maxIncomingConnections: 20000              # 最大连接数（按业务与资源评估）

replication:
  replSetName: rs0                           # 副本集名称（与初始化脚本一致）
  oplogSizeMB: 2048                          # oplog 大小（MB），写入量大时建议增大

security:
  authorization: enabled                     # 开启访问控制（RBAC）
  keyFile: /etc/mongo-keyfile/keyfile        # 副本集内部认证密钥（3 个节点必须一致）

operationProfiling:
  mode: slowOp                               # 仅记录慢操作（比 all 更适合生产）
  slowOpThresholdMs: 200                     # 慢操作阈值（ms），建议按业务调整

setParameter:
  enableLocalhostAuthBypass: true            # 初始化阶段允许 localhost 免认证创建首个用户（创建后自动失效）

