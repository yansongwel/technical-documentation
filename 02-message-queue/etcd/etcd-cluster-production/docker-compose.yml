# etcd 3 节点快速体验（仅开发/测试，严禁生产）
# 使用方式：docker compose up -d
# 验证：docker exec etcd1 etcdctl endpoint health --endpoints=http://localhost:2379,http://etcd2:2379,http://etcd3:2379
services:
  etcd1:
    image: quay.io/coreos/etcd:v3.6.8
    container_name: etcd1
    command:
      - etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-token=etcd-cluster-verify
      - --initial-cluster-state=new
    ports:
      - "23791:2379"
      - "23801:2380"
    networks: [etcd-net]

  etcd2:
    image: quay.io/coreos/etcd:v3.6.8
    container_name: etcd2
    command:
      - etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd2:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-token=etcd-cluster-verify
      - --initial-cluster-state=new
    ports:
      - "23792:2379"
      - "23802:2380"
    networks: [etcd-net]

  etcd3:
    image: quay.io/coreos/etcd:v3.6.8
    container_name: etcd3
    command:
      - etcd
      - --name=etcd3
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd3:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd3:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-token=etcd-cluster-verify
      - --initial-cluster-state=new
    ports:
      - "23793:2379"
      - "23803:2380"
    networks: [etcd-net]

networks:
  etcd-net:
    driver: bridge
